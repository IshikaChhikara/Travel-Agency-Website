<!DOCTYPE html>
<html>
<head>
<title>Book Your Trip - TravelX</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

<!-- NAVBAR -->
<nav>
  <h2>TravelX ✈️</h2>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="mybookings.html">My Bookings</a>
    <a href="wishlist.html">Wishlist ❤️</a>
  </div>
</nav>

<div class="container">

  <div class="place-hero">
    <div class="place-hero-img" id="placeHero">
      <span id="placeIcon" style="font-size:80px;">🌍</span>
    </div>
    <div class="place-info">
      <h2 id="placeName">Loading...</h2>
      <p id="desc">Amazing destination awaits you</p>
      <h3 id="price" style="color:#ff5722;"></h3>
      <button class="wish-btn" onclick="addWishlist()">❤️ Add to Wishlist</button>
    </div>
  </div>

  <hr style="margin:25px 0;border:1px solid #eee;">

  <h3 style="margin-bottom:20px;">📋 Booking Details</h3>

  <form id="bookingForm" onsubmit="saveData(event)">

    <div class="form-row">
      <input type="text" id="name" placeholder="👤 Your Full Name" required>
      <input type="email" id="email" placeholder="📧 Email Address" required>
    </div>

    <div class="form-row">
      <input type="tel" id="phone" placeholder="📞 Phone Number" required pattern="[0-9]{10}" maxlength="10">
      <input type="number" id="age" placeholder="🎂 Age (18+)" required min="18" max="100">
    </div>

    <div class="form-row">
      <select id="gender" required>
        <option value="">👤 Select Gender</option>
        <option>Male</option>
        <option>Female</option>
        <option>Other</option>
      </select>
      <select id="travelType" required onchange="setPersons()">
        <option value="">✈️ Travel Type</option>
        <option>Solo</option>
        <option>Couple</option>
        <option>Family</option>
        <option>Friends</option>
      </select>
    </div>

    <div class="form-row">
      <input type="number" id="persons" placeholder="👥 Number of Persons" required min="1">
      <input type="date" id="date" required>
    </div>

    <div class="form-row">
      <select id="roomType" required>
        <option value="">🛏️ Select Room Type</option>
        <option>Single Bed (1 person)</option>
        <option>Double Bed (2 persons)</option>
        <option>2 Beds in One Room</option>
        <option>Luxury Room</option>
        <option>Suite</option>
      </select>
      <input type="number" id="rooms" placeholder="🏨 Number of Rooms" required min="1">
    </div>

    <div class="file-upload">
      <label>🪪 Aadhaar Card Upload (Masked Allowed)</label>
      <input type="file" id="aadhaar" accept="image/*,.pdf" required>
    </div>

    <textarea id="request" placeholder="💬 Any special requests? (Dietary needs, accessibility, celebrations, etc.)"></textarea>

    <div class="total-section" id="totalSection" style="display:none;">
      <div class="total-box">
        <span>Estimated Total</span>
        <span id="totalAmt" style="color:#ff5722;font-weight:700;font-size:20px;"></span>
      </div>
    </div>

    <button type="submit" class="submit-btn">💳 Proceed to Payment</button>

  </form>

</div>

<!-- PAYMENT POPUP -->
<div id="payment" class="payment-popup" style="display:none;">
  <div class="payment-box">
    <h3>🔒 Secure Payment</h3>
    <p id="payAmount" style="color:#ff5722;font-weight:600;font-size:18px;margin:10px 0;"></p>
    <hr style="margin-bottom:20px;">
    <p style="color:#666;margin-bottom:15px;">Enter Card Details</p>
    <input type="text" id="cardNum" placeholder="💳 Card Number (16 digits)" maxlength="19" oninput="formatCard(this)">
    <input type="text" id="expiry" placeholder="📅 Expiry MM/YY" maxlength="5" oninput="formatExpiry(this)">
    <input type="text" id="cvv" placeholder="🔐 CVV" maxlength="3" type="password">
    <input type="text" id="cardName" placeholder="👤 Name on Card">
    <div style="display:flex;gap:10px;">
      <button onclick="confirmPayment()" style="flex:1;">✅ Pay Now</button>
      <button onclick="document.getElementById('payment').style.display='none'" style="flex:1;background:#999;">❌ Cancel</button>
    </div>
  </div>
</div>

<!-- CHATBOT BUTTON -->
<button class="chat-btn" onclick="toggleChat()">💬</button>
<div id="chatbox" class="chatbox hidden">
  <div class="chat-header">
    <span>🤖 TravelX Assistant</span>
    <button onclick="toggleChat()">✕</button>
  </div>
  <div class="chat-body" id="chatBody">
    <div class="bot-msg">👋 Need help with your booking? Ask me!</div>
  </div>
  <div class="chat-footer">
    <input type="text" id="chatInput" placeholder="Ask me anything..." onkeydown="if(event.key==='Enter') sendMsg()">
    <button onclick="sendMsg()">➤</button>
  </div>
</div>

<script src="script.js"></script>
<script>
// Calculate total on persons/rooms change
document.getElementById('persons').addEventListener('input', updateTotal);
document.getElementById('rooms').addEventListener('input', updateTotal);

function updateTotal(){
  let price = parseInt(localStorage.getItem('selectedPrice') || 0);
  let persons = parseInt(document.getElementById('persons').value || 1);
  let rooms = parseInt(document.getElementById('rooms').value || 1);
  let total = price * persons;
  if(total > 0){
    document.getElementById('totalSection').style.display = 'block';
    document.getElementById('totalAmt').innerText = '₹' + total.toLocaleString('en-IN');
  }
}
</script>
</body>
</html>
